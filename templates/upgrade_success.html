<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surgecast — You're upgraded!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #07070f; color: #e2e2f0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #0f0f24; border: 1px solid #1e1e3a; border-radius: 20px;
      padding: 3rem 2.5rem; max-width: 420px; width: 100%; text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1.25rem; }
    h1 { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 0.6rem; }
    p { font-size: 0.95rem; color: #8888a8; line-height: 1.6; margin-bottom: 2rem; }
    a.btn {
      display: inline-block; background: #6366f1; color: #fff; font-weight: 700;
      padding: 0.85rem 2rem; border-radius: 8px; text-decoration: none;
      font-size: 0.95rem; transition: background 0.15s;
    }
    a.btn:hover { background: #4f46e5; }
  </style>
  <meta http-equiv="refresh" content="5;url=/dashboard">
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>You're on {{ plan_name }}!</h1>
    <p>
      Your subscription is active. Your new city limits and alert
      schedule are effective immediately.<br><br>
      Redirecting to your dashboard in a few seconds…
    </p>
    <a href="/dashboard" class="btn">Go to dashboard →</a>
  </div>
</body>
</html>
