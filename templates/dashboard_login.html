<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surgecast — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #07070f; color: #e2e2f0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .card {
      background: #0f0f24; border: 1px solid #1e1e3a; border-radius: 16px;
      padding: 2.5rem; width: 360px;
    }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; margin-bottom: 1.75rem; }
    .logo span { color: #6366f1; }
    h2 { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 0.4rem; }
    p { font-size: 0.9rem; color: #8888a8; margin-bottom: 1.5rem; line-height: 1.5; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: #6666a0;
            text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
    input { width: 100%; padding: 0.8rem 1rem; background: #07070f;
            border: 1px solid rgba(100,100,200,0.2); border-radius: 8px;
            color: #e2e2f0; font-size: 0.95rem; outline: none; margin-bottom: 1rem; }
    input:focus { border-color: #6366f1; }
    button { width: 100%; padding: 0.85rem; background: #6366f1; color: #fff;
             font-weight: 700; border: none; border-radius: 8px; cursor: pointer;
             font-size: 0.95rem; transition: background 0.15s; }
    button:hover { background: #4f46e5; }
    .error { margin-top: 1rem; padding: 0.75rem 1rem;
             background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3);
             border-radius: 8px; color: #f87171; font-size: 0.88rem; }
    .success { margin-top: 1rem; padding: 0.75rem 1rem;
               background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.3);
               border-radius: 8px; color: #a5b4fc; font-size: 0.88rem; line-height: 1.5; }
    .code-inputs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .code-inputs input {
      width: 100%; text-align: center; font-size: 1.5rem; font-weight: 700;
      padding: 0.75rem 0.5rem; letter-spacing: 2px;
    }
    .back { display: block; text-align: center; margin-top: 1rem;
            font-size: 0.82rem; color: #6666a0; text-decoration: none; }
    .back:hover { color: #e2e2f0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Surge<span>cast</span></div>

  {% if not sent %}
    <!-- Step 1: enter email -->
    <h2>Sign in</h2>
    <p>Enter your email and we'll send you a login code.</p>
    <form method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@yourbusiness.com" required autofocus>
      <button type="submit">Send login code →</button>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </form>

  {% else %}
    <!-- Step 2: enter code -->
    <h2>Check your inbox</h2>
    <p>We sent a 6-digit code to <strong>{{ email }}</strong>. It expires in 15 minutes.</p>
    <form method="POST" action="/dashboard/verify">
      <input type="hidden" name="email" value="{{ email }}">
      <label for="code">Login code</label>
      <input type="text" id="code" name="code" placeholder="000000"
             maxlength="6" inputmode="numeric" pattern="[0-9]{6}" required autofocus>
      <button type="submit">Verify →</button>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </form>
    <a href="/dashboard/login" class="back">← Use a different email</a>
  {% endif %}
</div>
</body>
</html>
